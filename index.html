<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Case Source State Performance Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0C0F14;color:#E2E8F0;font-family:'DM Sans',sans-serif;padding:24px 24px 48px}
.container{max-width:1500px;margin:0 auto}
.header{text-align:center;margin-bottom:24px}
h1{font-size:28px;font-weight:700;color:#F8FAFC;margin-bottom:6px}
.subtitle{color:#94A3B8;font-size:14px}

.kpi-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:18px}
.kpi-card{background:#151922;border:1px solid #1E293B;border-radius:10px;padding:14px 16px}
.kpi-label{color:#94A3B8;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px}
.kpi-value{font-size:20px;font-weight:700;color:#F8FAFC;font-family:'JetBrains Mono',monospace}
.kpi-sub{color:#64748B;font-size:11px;margin-top:4px;font-family:'JetBrains Mono',monospace}

.panel{background:#0F1319;border:1px solid #1E293B;border-radius:10px;overflow:hidden}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:#151922;color:#94A3B8;font-weight:600;padding:11px 12px;text-align:left;white-space:nowrap;cursor:pointer;user-select:none;border-bottom:2px solid #1E293B;font-size:11px;text-transform:uppercase;letter-spacing:.5px}
th:hover{color:#CBD5E1}
th .arrow{font-size:9px;margin-left:3px;opacity:.3}
th.sorted .arrow{opacity:1;color:#3B82F6}
td{padding:10px 12px;border-bottom:1px solid #1E293B;white-space:nowrap;font-family:'JetBrains Mono',monospace;font-size:12px}
tr:hover td{background:#1a1f2e}
td.state-cell{font-family:'DM Sans',sans-serif;font-weight:500;color:#F1F5F9;font-size:13px}
td.r,th.r{text-align:right}

.bar-cell{min-width:160px;width:18%}
.bar-cell .bar-wrap{display:flex;align-items:center;gap:10px}
.bar-val{flex-shrink:0;font-size:12px;min-width:42px}
.bar-bg{flex:1;height:6px;background:#1E293B;border-radius:3px;overflow:hidden}
.bar-fg{height:100%;background:linear-gradient(90deg,#3B82F6,#60A5FA);border-radius:3px;min-width:2px}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>Case Source — State Performance</h1>
    <p class="subtitle">Spend, Leads, CPL, Signed Cases & CPA by State</p>
  </div>

  <div class="kpi-grid" id="kpiGrid"></div>

  <div class="panel">
    <div class="table-wrap">
      <table id="stateTable">
        <thead>
          <tr>
            <th data-sort="state">State <span class="arrow">▼</span></th>
            <th class="r" data-sort="spend">Spend <span class="arrow">▼</span></th>
            <th data-sort="spend" class="bar-cell">Spend Share <span class="arrow">▼</span></th>
            <th class="r" data-sort="leads">Leads <span class="arrow">▼</span></th>
            <th class="r" data-sort="cpl">CPL <span class="arrow">▼</span></th>
            <th class="r" data-sort="cases">Signed <span class="arrow">▼</span></th>
            <th class="r" data-sort="signRate">Sign Rate <span class="arrow">▼</span></th>
            <th class="r" data-sort="cpa">CPA <span class="arrow">▼</span></th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
const RAW = [
  {state:"Texas",         spend:51143.55, leads:459, cpl:111.42, cases:19, signRate:4.14, cpa:2691.77},
  {state:"North Carolina",spend:26067.33, leads:201, cpl:129.69, cases:10, signRate:4.98, cpa:2606.73},
  {state:"Ohio",          spend:25247.65, leads:199, cpl:126.87, cases:16, signRate:8.04, cpa:1577.98},
  {state:"Georgia",       spend:20674.89, leads:167, cpl:123.80, cases:6,  signRate:3.59, cpa:3445.82},
  {state:"Illinois",      spend:19576.87, leads:155, cpl:126.30, cases:11, signRate:7.10, cpa:1779.72},
  {state:"Tennessee",     spend:17805.14, leads:133, cpl:133.87, cases:10, signRate:7.52, cpa:1780.51},
  {state:"Missouri",      spend:16744.30, leads:128, cpl:130.81, cases:3,  signRate:2.34, cpa:5581.43},
  {state:"Alabama",       spend:15740.85, leads:173, cpl:90.99,  cases:9,  signRate:5.20, cpa:1748.98},
  {state:"Louisiana",     spend:11041.87, leads:122, cpl:90.51,  cases:5,  signRate:4.10, cpa:2208.37},
  {state:"Indiana",       spend:9789.05,  leads:83,  cpl:117.94, cases:7,  signRate:8.43, cpa:1398.44},
  {state:"Arizona",       spend:9787.48,  leads:84,  cpl:116.52, cases:3,  signRate:3.57, cpa:3262.49},
  {state:"Nevada",        spend:7628.21,  leads:54,  cpl:141.26, cases:1,  signRate:1.85, cpa:7628.21},
  {state:"Colorado",      spend:6318.55,  leads:58,  cpl:108.94, cases:4,  signRate:6.90, cpa:1579.64},
  {state:"New Mexico",    spend:6247.24,  leads:64,  cpl:97.61,  cases:3,  signRate:4.69, cpa:2082.41},
  {state:"Michigan",      spend:0.09,     leads:9,   cpl:0.01,   cases:1,  signRate:11.11,cpa:0.09},
  {state:"Unknown",       spend:2.81,     leads:0,   cpl:null,   cases:0,  signRate:null, cpa:null},
];

const fmtMoney = v => v==null ? "—" : "$"+v.toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtMoney0= v => v==null ? "—" : "$"+Math.round(v).toLocaleString("en-US");
const fmtInt   = v => v==null ? "—" : v.toLocaleString("en-US");
const fmtPct   = v => v==null || isNaN(v) ? "—" : v.toFixed(2)+"%";

const totalSpend = RAW.reduce((s,r)=>s+r.spend,0);
const totalLeads = RAW.reduce((s,r)=>s+r.leads,0);
const totalCases = RAW.reduce((s,r)=>s+r.cases,0);
const blendedCPL  = totalLeads ? totalSpend/totalLeads : null;
const blendedCPA  = totalCases ? totalSpend/totalCases : null;
const blendedSign = totalLeads ? totalCases/totalLeads*100 : null;

const cards = [
  {label:"Total Spend",   val:fmtMoney0(totalSpend), sub:`${RAW.length} states`},
  {label:"Leads",         val:fmtInt(totalLeads),    sub:`Blended CPL ${fmtMoney(blendedCPL)}`},
  {label:"Signed Cases",  val:fmtInt(totalCases),    sub:`Blended CPA ${fmtMoney0(blendedCPA)}`},
  {label:"Sign Rate",     val:fmtPct(blendedSign),   sub:`${totalCases} cases / ${totalLeads} leads`},
  {label:"Top State",     val:"Texas",               sub:`${fmtMoney0(51143.55)} · 19 cases`},
];
document.getElementById("kpiGrid").innerHTML = cards.map(c=>`
  <div class="kpi-card">
    <div class="kpi-label">${c.label}</div>
    <div class="kpi-value">${c.val}</div>
    <div class="kpi-sub">${c.sub}</div>
  </div>`).join("");

let sortKey = "spend", sortDir = -1;
const maxSpend = Math.max(...RAW.map(d=>d.spend));

function render(){
  const sorted = [...RAW].sort((a,b)=>{
    const av = a[sortKey], bv = b[sortKey];
    if(av==null && bv==null) return 0;
    if(av==null) return 1;
    if(bv==null) return -1;
    if(typeof av === "string") return av.localeCompare(bv) * sortDir;
    return (av-bv)*sortDir;
  });
  document.getElementById("tbody").innerHTML = sorted.map(r=>{
    const sharePct = r.spend/totalSpend*100;
    return `<tr>
      <td class="state-cell">${r.state}</td>
      <td class="r">${fmtMoney(r.spend)}</td>
      <td class="bar-cell">
        <div class="bar-wrap">
          <span class="bar-val">${sharePct.toFixed(1)}%</span>
          <div class="bar-bg"><div class="bar-fg" style="width:${sharePct.toFixed(1)}%"></div></div>
        </div>
      </td>
      <td class="r">${fmtInt(r.leads)}</td>
      <td class="r">${fmtMoney(r.cpl)}</td>
      <td class="r">${fmtInt(r.cases)}</td>
      <td class="r">${fmtPct(r.signRate)}</td>
      <td class="r">${fmtMoney0(r.cpa)}</td>
    </tr>`;
  }).join("");

  document.querySelectorAll("#stateTable th").forEach(th=>{
    th.classList.toggle("sorted", th.dataset.sort===sortKey);
    const arr = th.querySelector(".arrow");
    if(arr) arr.textContent = th.dataset.sort===sortKey ? (sortDir<0 ? "▼" : "▲") : "▼";
  });
}
document.querySelectorAll("#stateTable th").forEach(th=>{
  th.addEventListener("click", ()=>{
    const k = th.dataset.sort;
    if(!k) return;
    if(sortKey===k) sortDir = -sortDir;
    else { sortKey = k; sortDir = (k==="state") ? 1 : -1; }
    render();
  });
});
render();
</script>
</body>
</html>
